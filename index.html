<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expense & Budget Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1e1e2e;
    color: #cdd6f4;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    color: #89b4fa;
    margin-bottom: 6px;
    font-size: 22px;
    letter-spacing: 2px;
  }
  p.sub {
    color: #6c7086;
    font-size: 12px;
    margin-bottom: 16px;
  }
  #terminal {
    background: #11111b;
    border: 1px solid #313244;
    border-radius: 10px;
    width: 100%;
    max-width: 750px;
    height: 420px;
    overflow-y: auto;
    padding: 16px;
    font-size: 14px;
    line-height: 1.6;
    color: #cdd6f4;
    white-space: pre-wrap;
    word-break: break-all;
  }
  #input-row {
    display: flex;
    width: 100%;
    max-width: 750px;
    margin-top: 10px;
    gap: 8px;
  }
  #prompt-label {
    color: #a6e3a1;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    padding: 10px 12px;
    background: #11111b;
    border: 1px solid #313244;
    border-radius: 8px 0 0 8px;
    white-space: nowrap;
  }
  #user-input {
    flex: 1;
    background: #181825;
    color: #cdd6f4;
    border: 1px solid #45475a;
    border-left: none;
    padding: 10px 12px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    outline: none;
  }
  #user-input:focus { border-color: #89b4fa; }
  #send-btn {
    background: #89b4fa;
    color: #1e1e2e;
    border: none;
    padding: 10px 20px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    border-radius: 0 8px 8px 0;
    cursor: pointer;
  }
  #send-btn:hover { background: #b4befe; }
  .info {
    color: #6c7086;
    font-size: 12px;
    margin-top: 10px;
    max-width: 750px;
    text-align: center;
  }
  #status {
    color: #f38ba8;
    font-size: 12px;
    margin-top: 6px;
  }
</style>
</head>
<body>
<h1>Expense &amp; Budget Tracker</h1>
<p class="sub">DA1 — C Programming Mini Project | R Sainaath | 25BCE1960</p>
<div id="terminal">Loading program...</div>
<div id="input-row">
  <span id="prompt-label">&gt;</span>
  <input id="user-input" type="text" placeholder="Type your input here and press Enter..." autofocus/>
  <button id="send-btn" onclick="sendInput()">Send</button>
</div>
<p class="info">Type a number and press Enter or click Send to interact with the program.</p>
<div id="status"></div>

<script type='text/javascript'>
  var Module = {
    print: function(text) {
      var t = document.getElementById('terminal');
      t.textContent += text + '\n';
      t.scrollTop = t.scrollHeight;
    },
    printErr: function(text) {
      var t = document.getElementById('terminal');
      t.textContent += text + '\n';
      t.scrollTop = t.scrollHeight;
    },
    canvas: (function() {
      var canvas = document.createElement('canvas');
      return canvas;
    })(),
    setStatus: function(text) {
      if (text) document.getElementById('status').textContent = text;
    },
    onRuntimeInitialized: function() {
      document.getElementById('terminal').textContent = '';
      document.getElementById('status').textContent = 'Program running. Type a menu option below.';
    }
  };

  var inputQueue = [];
  var inputBuffer = '';
  var waitingForInput = false;

  function sendInput() {
    var inp = document.getElementById('user-input');
    var val = inp.value;
    inp.value = '';
    var t = document.getElementById('terminal');
    t.textContent += '> ' + val + '\n';
    t.scrollTop = t.scrollHeight;
    inputQueue.push(val + '\n');
  }

  document.getElementById('user-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendInput();
  });
</script>
<script src="index.js"></script>
</body>
</html>
